name: GitHub Profile Summary Cards

# Manual trigger requested on 2026-07-21
on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-summary.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Generate summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: 9
          EXCLUDE: ""
          AUTO_PUSH: false

      - name: Commit generated cards
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "profile-summary-card-output" ]; then
            echo "profile-summary-card-output was not generated."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/

          if git diff --cached --quiet; then
            echo "No summary card changes to commit."
            exit 0
          fi

          git commit -m "chore: update GitHub profile summary cards"
          git push origin HEAD:main
